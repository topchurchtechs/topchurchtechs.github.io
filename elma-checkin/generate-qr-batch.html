<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code 批次產生器</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"
    onerror="window.__qrcodeLoadFailed=true"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 4rem;
    }

    .page {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    header p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .hidden {
      display: none !important;
    }

    /* ── 上傳區 ── */
    #drop-zone {
      border: 2px dashed #334155;
      border-radius: 1rem;
      padding: 3rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #38bdf8;
      background: #0f2744;
    }

    #drop-zone .icon {
      font-size: 2.5rem;
    }

    #drop-zone .label {
      font-size: 1rem;
      color: #94a3b8;
    }

    #drop-zone .hint {
      font-size: 0.8rem;
      color: #475569;
    }

    #drop-zone .file-name {
      font-size: 0.875rem;
      color: #7dd3fc;
      background: #0f2744;
      border: 1px solid #38bdf8;
      border-radius: 0.4rem;
      padding: 0.3rem 0.75rem;
    }

    #file-input {
      display: none;
    }

    /* ── 欄位設定 ── */
    .section-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    .col-selects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .col-selects .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .col-selects label {
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .col-selects select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #f1f5f9;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      cursor: pointer;
    }

    .col-selects select:focus {
      border-color: #38bdf8;
    }

    .col-selects select.error {
      border-color: #ef4444;
    }

    /* ── 預覽表格 ── */
    .preview-wrap {
      overflow-x: auto;
      border-radius: 0.5rem;
      border: 1px solid #334155;
    }

    #preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    #preview-table th {
      background: #0f172a;
      color: #64748b;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      text-align: left;
      white-space: nowrap;
    }

    #preview-table td {
      padding: 0.45rem 0.75rem;
      border-top: 1px solid #1e293b;
      color: #cbd5e1;
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #preview-table tr.highlight-id td:nth-child(var(--id-col)),
    #preview-table tr.highlight-name td:nth-child(var(--name-col)) {
      color: #7dd3fc;
    }

    #preview-table th.col-id,
    #preview-table th.col-name {
      color: #38bdf8;
    }

    /* ── 錯誤 ── */
    .error-box {
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 0.5rem;
      color: #fca5a5;
      font-size: 0.875rem;
      padding: 0.65rem 0.875rem;
    }

    /* ── 按鈕 ── */
    .btn-primary {
      padding: 0.85rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:active {
      background: #1e40af;
    }

    .btn-primary:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn-secondary {
      flex: 1;
      padding: 0.7rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      color: #cbd5e1;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: #263549;
    }

    /* ── 進度 ── */
    #progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #progress-bar-track {
      height: 6px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar-fill {
      height: 100%;
      background: #38bdf8;
      border-radius: 99px;
      transition: width 0.15s;
      width: 0%;
    }

    #progress-label {
      font-size: 0.85rem;
      color: #64748b;
      text-align: center;
    }

    /* ── 識別卡格線 ── */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1rem;
    }

    .card-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .card-item canvas {
      width: 100%;
      height: auto;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    .card-item canvas:hover {
      opacity: 0.85;
    }

    .card-label {
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6rem);
      min-width: 240px;
      max-width: 90vw;
      padding: 0.85rem 1.2rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      text-align: center;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success {
      background: #166534;
      color: #bbf7d0;
      border: 1px solid #22c55e;
    }

    #toast.error {
      background: #7f1d1d;
      color: #fecaca;
      border: 1px solid #ef4444;
    }

    #toast.info {
      background: #1e3a5f;
      color: #bae6fd;
      border: 1px solid #38bdf8;
    }

    /* ── 列印 ── */
    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      #step-upload,
      #step-mapping,
      .btn-row,
      #progress-wrap,
      header,
      #toast {
        display: none !important;
      }

      #card-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .card-item canvas {
        width: 100%;
        height: auto;
      }

      .card-label {
        color: #000;
      }
    }
  </style>
</head>

<body>

  <div class="page">
    <header>
      <h1>📦 QR Code 批次產生器</h1>
      <p>上傳 CSV，自動為每位學生產生識別卡</p>
    </header>

    <!-- Step 1: 上傳 -->
    <div id="step-upload">
      <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📂</div>
        <div class="label">拖曳 CSV 至此，或點擊選擇檔案</div>
        <div class="hint">支援 UTF-8 編碼的 CSV 檔案</div>
      </div>
      <input type="file" id="file-input" accept=".csv,text/csv" />
    </div>

    <!-- Step 2: 欄位設定 -->
    <div id="step-mapping" class="hidden">
      <div class="section-card">
        <div class="section-title">欄位設定</div>

        <div class="col-selects">
          <div class="field">
            <label>學號 ID 欄位</label>
            <select id="sel-id" onchange="updatePreview()"></select>
          </div>
          <div class="field">
            <label>姓名欄位</label>
            <select id="sel-name" onchange="updatePreview()"></select>
          </div>
        </div>

        <div id="map-error" class="error-box hidden"></div>

        <div class="preview-wrap">
          <table id="preview-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

        <button class="btn-primary" id="btn-generate" onclick="startGenerate()">產生 QR Code</button>
      </div>
    </div>

    <!-- Step 3: 結果 -->
    <div id="step-results" class="hidden">
      <div id="progress-wrap" class="hidden">
        <div id="progress-bar-track">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-label">準備中…</div>
      </div>

      <div class="btn-row" id="result-actions" style="display:none">
        <button class="btn-secondary" onclick="downloadZip()">⬇ 下載全部 ZIP</button>
        <button class="btn-secondary" onclick="window.print()">🖨 列印</button>
        <button class="btn-secondary" onclick="reset()">↩ 重新上傳</button>
      </div>

      <div id="card-grid"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ─── 狀態 ─────────────────────────────────────────────────────────────────
    let csvHeaders = [];
    let csvRows = [];          // array of string[]
    let generatedCards = [];       // { id, name, canvas }

    // ─── CSV 解析 ─────────────────────────────────────────────────────────────
    function parseCSV(text) {
      // 去除 BOM
      text = text.replace(/^\uFEFF/, "");
      const lines = text.trim().split(/\r?\n/);
      return lines.map(line => {
        const fields = [];
        let field = "", inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === "," && !inQ) { fields.push(field.trim()); field = ""; }
          else { field += c; }
        }
        fields.push(field.trim());
        return fields;
      });
    }

    function loadCSV(text) {
      const rows = parseCSV(text);
      if (rows.length < 2) {
        showMapError("CSV 至少需要一列標題列和一列資料");
        return;
      }
      const cols = rows[0].length;
      if (cols < 2) {
        showMapError("CSV 需要至少兩個欄位才能分別對應學號與姓名");
        return;
      }

      csvHeaders = rows[0];
      csvRows = rows.slice(1).filter(r => r.some(c => c !== ""));

      // 填充 select
      ["sel-id", "sel-name"].forEach(selId => {
        const sel = document.getElementById(selId);
        sel.innerHTML = "";
        csvHeaders.forEach((h, i) => {
          const opt = document.createElement("option");
          opt.value = i;
          opt.textContent = `欄 ${i + 1}（${h || "無標題"}）`;
          sel.appendChild(opt);
        });
      });
      // 預設：第 1 欄 → id，第 2 欄 → name
      document.getElementById("sel-id").value = 0;
      document.getElementById("sel-name").value = 1;

      document.getElementById("step-upload").classList.add("hidden");
      document.getElementById("step-mapping").classList.remove("hidden");
      hideMapError();
      updatePreview();
    }

    // ─── 預覽表格 ──────────────────────────────────────────────────────────────
    function updatePreview() {
      const idCol = parseInt(document.getElementById("sel-id").value);
      const nameCol = parseInt(document.getElementById("sel-name").value);
      hideMapError();

      const thead = document.querySelector("#preview-table thead");
      const tbody = document.querySelector("#preview-table tbody");

      // Header row
      thead.innerHTML = "<tr>" + csvHeaders.map((h, i) => {
        const cls = i === idCol ? "col-id" : i === nameCol ? "col-name" : "";
        const badge = i === idCol ? " 🔑" : i === nameCol ? " 👤" : "";
        return `<th class="${cls}">${escHtml(h || `欄${i + 1}`)}${badge}</th>`;
      }).join("") + "</tr>";

      // Data rows (first 5)
      tbody.innerHTML = csvRows.slice(0, 5).map(row =>
        "<tr>" + csvHeaders.map((_, i) =>
          `<td>${escHtml(row[i] ?? "")}</td>`
        ).join("") + "</tr>"
      ).join("");
    }

    // ─── 錯誤顯示 ─────────────────────────────────────────────────────────────
    function showMapError(msg) {
      const el = document.getElementById("map-error");
      el.textContent = msg;
      el.classList.remove("hidden");
    }
    function hideMapError() {
      document.getElementById("map-error").classList.add("hidden");
    }

    // ─── JWT ──────────────────────────────────────────────────────────────────
    function makeUnsignedJWT(id, name) {
      const b64url = obj => {
        const bytes = new TextEncoder().encode(JSON.stringify(obj));
        return btoa(String.fromCharCode(...bytes))
          .replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
      };
      const header = { alg: "none", typ: "JWT" };
      const payload = { id, name, iat: Math.floor(Date.now() / 1000) };
      return `${b64url(header)}.${b64url(payload)}.`;
    }

    // ─── 識別卡 Canvas ────────────────────────────────────────────────────────
    const QR_SIZE = 300;
    const PAD = 18;
    const CARD_W = QR_SIZE + PAD * 2;

    function generateCard(id, name) {
      return new Promise((resolve, reject) => {
        const qrCanvas = document.createElement("canvas");
        QRCode.toCanvas(qrCanvas, makeUnsignedJWT(id, name), {
          width: QR_SIZE,
          margin: 2,
          color: { dark: "#0f172a", light: "#f1f5f9" },
        }, err => {
          if (err) { reject(err); return; }

          const card = document.createElement("canvas");
          const ctx = card.getContext("2d");
          {

            // 先量文字高度再定 canvas 高度
            ctx.font = "bold 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            const nameMetrics = ctx.measureText(name);
            const nameH = nameMetrics.actualBoundingBoxAscent + nameMetrics.actualBoundingBoxDescent;

            ctx.font = "14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            const idMetrics = ctx.measureText(`ID: ${id}`);
            const idH = idMetrics.actualBoundingBoxAscent + idMetrics.actualBoundingBoxDescent;

            const SEP_AREA = PAD + 1 + PAD * 0.6;   // gap + line + gap
            const CARD_H = PAD + QR_SIZE + SEP_AREA + nameH + 8 + idH + PAD;

            card.width = CARD_W;
            card.height = Math.ceil(CARD_H);

            // 白底
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, card.width, card.height);

            // 圓角外框
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 2;
            roundRect(ctx, 1, 1, card.width - 2, card.height - 2, 12);
            ctx.stroke();

            // QR Code
            ctx.drawImage(qrCanvas, PAD, PAD, QR_SIZE, QR_SIZE);

            // 分隔線
            const sepY = PAD + QR_SIZE + PAD * 0.6;
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(PAD, sepY);
            ctx.lineTo(card.width - PAD, sepY);
            ctx.stroke();

            // 姓名
            ctx.font = "bold 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            ctx.fillStyle = "#0f172a";
            ctx.textAlign = "center";
            const nameY = sepY + PAD * 0.6 + nameMetrics.actualBoundingBoxAscent;
            ctx.fillText(name, card.width / 2, nameY);

            // ID
            ctx.font = "14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            ctx.fillStyle = "#64748b";
            const idY = nameY + nameH + 8 + idMetrics.actualBoundingBoxAscent;
            ctx.fillText(`ID: ${id}`, card.width / 2, idY);

            resolve(card);
          }
        });
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ─── 批次產生 ─────────────────────────────────────────────────────────────
    async function startGenerate() {
      if (typeof QRCode === "undefined") {
        showMapError("qrcode.js 未載入，請確認網路連線後重新整理頁面");
        return;
      }
      const idCol = parseInt(document.getElementById("sel-id").value);
      const nameCol = parseInt(document.getElementById("sel-name").value);

      if (idCol === nameCol) {
        showMapError("學號欄位與姓名欄位不能相同，請重新選擇");
        document.getElementById("sel-id").classList.add("error");
        document.getElementById("sel-name").classList.add("error");
        return;
      }
      document.getElementById("sel-id").classList.remove("error");
      document.getElementById("sel-name").classList.remove("error");

      const students = [];
      const skipped = [];
      csvRows.forEach((row, i) => {
        const id = (row[idCol] ?? "").trim();
        const name = (row[nameCol] ?? "").trim();
        if (!id || !name) { skipped.push(i + 2); return; }   // +2 = 標題列 + 1-index
        students.push({ id, name });
      });

      if (students.length === 0) {
        showMapError("沒有有效的學生資料，請確認欄位選擇是否正確");
        return;
      }

      hideMapError();
      document.getElementById("btn-generate").disabled = true;
      document.getElementById("step-results").classList.remove("hidden");
      document.getElementById("progress-wrap").classList.remove("hidden");

      const grid = document.getElementById("card-grid");
      grid.innerHTML = "";
      generatedCards = [];

      for (let i = 0; i < students.length; i++) {
        const { id, name } = students[i];
        setProgress(i, students.length, `產生中：${name} (${i + 1}/${students.length})`);

        try {
          const canvas = await generateCard(id, name);
          generatedCards.push({ id, name, canvas });

          const wrap = document.createElement("div");
          wrap.className = "card-item";
          canvas.title = `點擊下載 ${name}`;
          canvas.addEventListener("click", () => downloadOne(canvas, id, name));
          const label = document.createElement("div");
          label.className = "card-label";
          label.textContent = `${name} · ${id}`;
          wrap.append(canvas, label);
          grid.appendChild(wrap);
        } catch (err) {
          console.error(`產生失敗 ${id}:`, err);
        }
      }

      setProgress(students.length, students.length, `完成！共 ${students.length} 位`);
      setTimeout(() => document.getElementById("progress-wrap").classList.add("hidden"), 1500);

      document.getElementById("result-actions").style.display = "flex";
      document.getElementById("btn-generate").disabled = false;

      if (skipped.length > 0) {
        showToast(`略過 ${skipped.length} 筆空白資料（第 ${skipped.join("、")} 列）`, "info");
      } else {
        showToast(`✅ 成功產生 ${students.length} 張識別卡`, "success");
      }
    }

    function setProgress(done, total, label) {
      document.getElementById("progress-bar-fill").style.width = `${(done / total) * 100}%`;
      document.getElementById("progress-label").textContent = label;
    }

    // ─── 下載 ─────────────────────────────────────────────────────────────────
    function downloadOne(canvas, id, name) {
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `${id}_${name.replace(/[/\\]/g, "_")}.png`;
      a.click();
    }

    async function downloadZip() {
      if (generatedCards.length === 0) return;
      showToast("打包中…", "info");
      const zip = new JSZip();
      generatedCards.forEach(({ id, name, canvas }) => {
        const base64 = canvas.toDataURL("image/png").split(",")[1];
        const safeName = name.replace(/[/\\]/g, "_");
        zip.file(`${id}_${safeName}.png`, base64, { base64: true });
      });
      const blob = await zip.generateAsync({ type: "blob" });
      saveAs(blob, "elma-qrcodes.zip");
      showToast(`✅ ZIP 下載完成（${generatedCards.length} 張）`, "success");
    }

    // ─── 重置 ──────────────────────────────────────────────────────────────────
    function reset() {
      csvHeaders = []; csvRows = []; generatedCards = [];
      document.getElementById("card-grid").innerHTML = "";
      document.getElementById("result-actions").style.display = "none";
      document.getElementById("step-results").classList.add("hidden");
      document.getElementById("step-mapping").classList.add("hidden");
      document.getElementById("step-upload").classList.remove("hidden");
      document.getElementById("file-input").value = "";
      const dz = document.getElementById("drop-zone");
      dz.querySelector(".label").textContent = "拖曳 CSV 至此，或點擊選擇檔案";
      const fn = dz.querySelector(".file-name");
      if (fn) fn.remove();
    }

    // ─── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "info") {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ""; }, 3500);
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    // ─── 拖曳 & 選檔 ──────────────────────────────────────────────────────────
    function handleFile(file) {
      if (!file || !file.name.endsWith(".csv")) {
        showToast("請選擇 .csv 檔案", "error");
        return;
      }
      const dz = document.getElementById("drop-zone");
      dz.querySelector(".label").textContent = "";
      let fn = dz.querySelector(".file-name");
      if (!fn) { fn = document.createElement("div"); fn.className = "file-name"; dz.appendChild(fn); }
      fn.textContent = file.name;

      const reader = new FileReader();
      reader.onload = e => loadCSV(e.target.result);
      reader.readAsText(file, "UTF-8");
    }

    // ─── 檢查 CDN 是否載入 ────────────────────────────────────────────────────
    if (window.__qrcodeLoadFailed || typeof QRCode === "undefined") {
      document.getElementById("drop-zone").innerHTML = `
      <div class="icon">⚠️</div>
      <div class="label" style="color:#f87171">qrcode.js 載入失敗</div>
      <div class="hint">請確認網路連線後重新整理頁面<br>（需要連線至 cdn.jsdelivr.net）</div>`;
      document.getElementById("drop-zone").style.cursor = "default";
    }

    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
  </script>
</body>

</html>
