<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>點名系統</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4fb;
      color: #1e2a5e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    #error-screen, #line-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      flex: 1;
    }
    #error-screen .icon, #line-screen .icon { font-size: 3rem; }
    #error-screen h2 { color: #f87171; font-size: 1.4rem; }
    #error-screen p  { color: #6b7a9b; font-size: 0.9rem; line-height: 1.6; }

    #line-screen h2 { color: #1e2a5e; font-size: 1.4rem; }
    #line-screen p  { color: #6b7a9b; font-size: 0.9rem; line-height: 1.6; max-width: 320px; }
    #line-screen .btn-primary {
      margin-top: 0.5rem;
      width: 100%;
      max-width: 320px;
      padding: 0.9rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }
    #line-screen .btn-secondary {
      width: 100%;
      max-width: 320px;
      padding: 0.75rem;
      background: #e8edf8;
      color: #4b5580;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* 拍照模式按鈕（LINE 留在內建瀏覽器時使用） */
    #photo-scan-btn {
      display: none;
      width: 100%;
      padding: 1.1rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    #photo-scan-btn.show { display: block; }

    #main-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      /* 手機：全寬；桌機：不超過視窗高度換算出的正方形寬度 */
      max-width: min(100%, calc(100dvh - 220px));
    }

    header { text-align: center; }
    header h1 { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }

    .school-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0;
    }
    .school-brand img { height: 56px; width: auto; object-fit: contain; filter: brightness(0) opacity(0.75); }

    .type-toggle {
      display: flex;
      margin-top: 0.6rem;
      background: #e8edf8;
      border-radius: 99px;
      padding: 4px;
      gap: 3px;
    }
    .type-toggle button {
      flex: 1;
      padding: 0.5rem 1.75rem;
      border: none;
      border-radius: 99px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #8492b0;
      transition: background 0.2s, color 0.2s;
    }
    .type-toggle button.active-checkin  { background: #e4eeea; color: #345a46; }
    .type-toggle button.active-checkout { background: #f0ebe4; color: #6a4030; }

    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #1e293b;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px solid #d0d8ea;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 60%;
      aspect-ratio: 1;
      position: relative;
    }
    .scan-frame::before,
    .scan-frame::after,
    .scan-frame > span::before,
    .scan-frame > span::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #3b6fd4;
      border-style: solid;
    }
    .scan-frame::before        { top: 0;    left: 0;  border-width: 3px 0 0 3px; }
    .scan-frame::after         { top: 0;    right: 0; border-width: 3px 3px 0 0; }
    .scan-frame > span::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
    .scan-frame > span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

    .scan-line {
      position: absolute;
      left: 5%; right: 5%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b6fd4, transparent);
      animation: scan 2s ease-in-out infinite;
      top: 10%;
    }
    @keyframes scan {
      0%   { top: 10%; opacity: 1; }
      90%  { top: 90%; opacity: 1; }
      100% { top: 90%; opacity: 0; }
    }

    .camera-wrapper.flash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.35);
      animation: flash 0.3s ease-out forwards;
      pointer-events: none;
    }
    @keyframes flash { from { opacity: 1; } to { opacity: 0; } }

    .hint {
      font-size: 1rem;
      color: #6b7a9b;
      text-align: center;
    }

    #log-list {
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #log-list:empty::after {
      content: "尚無掃描記錄";
      display: block;
      text-align: center;
      color: #9aabc5;
      font-size: 0.85rem;
      padding: 1rem 0;
    }
    .log-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #ffffff;
      border-radius: 0.6rem;
      padding: 0.7rem 1rem;
      box-shadow: 0 1px 4px rgba(30,42,94,0.08);
      font-size: 1rem;
      border-left: 3px solid #5a8a6a;
      animation: slideIn 0.3s ease-out;
    }
    .log-item.dup { border-left-color: #f59e0b; }
    .log-item.err { border-left-color: #ef4444; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-item .name { font-weight: 600; color: #1e2a5e; flex: 1; }
    .log-item .tag  { font-size: 0.85rem; color: #6b7a9b; background: #eef2fb; border-radius: 4px; padding: 2px 7px; }
    .log-item .time { color: #8492b0; font-size: 0.9rem; white-space: nowrap; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6rem);
      min-width: 260px;
      max-width: 90vw;
      padding: 0.9rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 1.05rem;
      text-align: center;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { background: #2a4d3a; color: #c8e6d4; border: 1px solid #5a8a6a; }
    #toast.error   { background: #4d2a2a; color: #e6c8c8; border: 1px solid #a87070; }
    #toast.info    { background: #e2e8f4; color: #2d3d6e; border: 1px solid #8a9bbf; }

    #submit-frame { display: none; }

    #camera-select-wrapper {
      width: 100%;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #camera-select-wrapper.show { display: flex; }
    #camera-select {
      flex: 1;
      background: #ffffff;
      color: #1e2a5e;
      border: 1px solid #d0d8ea;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
    }
    #camera-select:focus { border-color: #3b6fd4; }
  </style>
</head>
<body>

  <!-- LINE Android screen -->
  <div id="line-screen">
    <div class="icon">🌐</div>
    <h2>請用外部瀏覽器開啟</h2>
    <p>LINE 內建瀏覽器無法存取相機進行連續掃描。<br>建議點下方按鈕在 Chrome 中開啟，掃描體驗最佳。</p>
    <button class="btn-primary" onclick="openInChrome()">在 Chrome 開啟</button>
    <button class="btn-secondary" onclick="usePhotoMode()">留在 LINE（每次拍照掃描）</button>
  </div>

  <!-- Error screen (missing params) -->
  <div id="error-screen">
    <div class="icon">⚠️</div>
    <h2>缺少必要參數</h2>
    <p>請以正確連結開啟本頁面，例如：<br>
      <code style="color:#7dd3fc">?serviceToken=TOKEN</code>
    </p>
  </div>

  <!-- Main screen -->
  <div id="main-screen">
    <header>
      <div class="school-brand">
        <img src="imgs/logo.png" alt="卓越領袖神學院" />
      </div>
      <h1>📋 點名系統</h1>
      <div class="type-toggle">
        <button id="btn-checkin"  onclick="setType('簽到')"  class="active-checkin">簽到</button>
        <button id="btn-checkout" onclick="setType('簽退')">簽退</button>
      </div>
    </header>

    <div class="camera-wrapper" id="camera-wrapper">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <span></span>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div id="camera-select-wrapper">
      <span style="color:#64748b;font-size:0.9rem;white-space:nowrap">📷 鏡頭</span>
      <select id="camera-select" onchange="switchCamera(this.value)"></select>
    </div>

    <button id="photo-scan-btn" onclick="triggerPhotoScan()">📷 點擊拍照掃描 QR Code</button>

    <p class="hint">將學生 QR Code 對準框內即可自動簽到</p>

    <div id="log-list"></div>
  </div>

  <div id="toast"></div>

  <canvas id="qr-canvas" style="display:none"></canvas>
  <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoFile(this)">

  <script>
    // ─── 設定區 ────────────────────────────────────────────────────────────────
    const CONFIG = {
      // Apps Script Web App 部署 URL
      scriptUrl: "https://script.google.com/macros/s/AKfycbws588quCukxxTLvZUYubb-YNfbjUp61BhVKcRxGnYkGlqhdHqfg92lybhHfiiZ3zoadg/exec",

      // 同一個 QR Code 的冷卻時間（毫秒），防止重複提交
      cooldownMs: 5000,
    };
    // ───────────────────────────────────────────────────────────────────────────

    // 讀取並隱藏 URL 參數
    const urlParams = new URLSearchParams(window.location.search);
    const SERVICE_TOKEN = urlParams.get("serviceToken");
    history.replaceState({}, document.title, window.location.pathname);

    // 簽到/簽退狀態（預設簽到）
    let currentType = "簽到";
    function setType(type) {
      currentType = type;
      document.getElementById("btn-checkin").className  = type === "簽到" ? "active-checkin"  : "";
      document.getElementById("btn-checkout").className = type === "簽退" ? "active-checkout" : "";
    }

    // ─── LINE / Android 偵測 ────────────────────────────────────────────────────
    const UA = navigator.userAgent;
    const isLineApp  = /Line\//i.test(UA);
    const isAndroid  = /Android/i.test(UA);
    const isLineAndroid = isLineApp && isAndroid;

    function openInChrome() {
      // intent:// 讓 Android 直接用 Chrome 開啟，並把 serviceToken 帶回去
      const target = `${location.origin}${location.pathname}?serviceToken=${SERVICE_TOKEN}`;
      location.href = `intent://${target.replace(/^https?:\/\//, "")}` +
                      `#Intent;scheme=https;package=com.android.chrome;` +
                      `S.browser_fallback_url=${encodeURIComponent(target)};end`;
    }

    function usePhotoMode() {
      // 隱藏 LINE 提示，進入主畫面（拍照模式）
      document.getElementById("line-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "flex";
      document.getElementById("camera-wrapper").style.display = "none";
      document.getElementById("photo-scan-btn").classList.add("show");
      document.querySelector(".hint").textContent = "點擊按鈕，拍下 QR Code 即可掃描";
    }

    function triggerPhotoScan() {
      document.getElementById("photo-input").value = ""; // 允許重複選同張圖
      document.getElementById("photo-input").click();
    }

    function handlePhotoFile(input) {
      const file = input.files[0];
      if (!file) return;
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: "dontInvert",
        });
        if (qr && qr.data) {
          handleQRCode(qr.data);
        } else {
          showToast("無法從照片中識別 QR Code，請重新拍攝", "error");
        }
      };
      img.src = url;
    }

    // 驗證參數
    if (!SERVICE_TOKEN) {
      document.getElementById("error-screen").style.display = "flex";
    } else if (isLineAndroid) {
      document.getElementById("line-screen").style.display = "flex";
    } else {
      document.getElementById("main-screen").style.display = "flex";
      startCamera();
    }

    // ─── JWT 解析（僅 decode payload，不驗簽） ─────────────────────────────────
    function decodeJWT(token) {
      const parts = token.trim().split(".");
      if (parts.length !== 3) throw new Error("不是有效的 JWT 格式");
      const base64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
      const binary = atob(base64.padEnd(base64.length + (4 - base64.length % 4) % 4, "="));
      const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    // ─── Apps Script 提交 ─────────────────────────────────────────────────────
    async function submitCheckin(id, name, type) {
      const res = await fetch(CONFIG.scriptUrl, {
        method: "POST",
        body: JSON.stringify({ action: "checkin", id, type, serviceToken: SERVICE_TOKEN }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error ?? "伺服器錯誤");
    }

    // ─── 重複掃描防護 ──────────────────────────────────────────────────────────
    const scannedCodes = new Map(); // id -> timestamp

    function isDuplicate(id) {
      const last = scannedCodes.get(id);
      if (!last) return false;
      return Date.now() - last < CONFIG.cooldownMs;
    }

    // ─── Toast 通知 ────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "info") {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ""; }, 3000);
    }

    // ─── 記錄清單 ──────────────────────────────────────────────────────────────
    function addLog(name, id, status = "ok", scanType = "") {
      const list = document.getElementById("log-list");
      const now  = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const item = document.createElement("div");
      item.className = `log-item ${status === "dup" ? "dup" : status === "err" ? "err" : ""}`;
      const tag = status === "ok" ? `<span class="tag">${escHtml(scanType)}</span>` : "";
      item.innerHTML = `<span class="name">${escHtml(name)}</span><span class="tag">${escHtml(id)}</span>${tag}<span class="time">${now}</span>`;
      list.prepend(item);
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    // ─── 相機與 QR 掃描 ────────────────────────────────────────────────────────
    let currentStream = null;

    async function startCamera() {
      try {
        // 先用 environment 取得權限並列出裝置
        const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        initStream.getTracks().forEach(t => t.stop()); // 只是要觸發權限

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === "videoinput");

        const sel = document.getElementById("camera-select");
        sel.innerHTML = "";
        cameras.forEach((cam, i) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || `鏡頭 ${i + 1}`;
          sel.appendChild(opt);
        });

        // 優先選後鏡頭（label 含 back / environment / 後）
        const backCam = cameras.find(c =>
          /back|environment|後/i.test(c.label)
        );
        if (backCam) sel.value = backCam.deviceId;

        // 多於一顆才顯示下拉
        if (cameras.length > 1) {
          document.getElementById("camera-select-wrapper").classList.add("show");
        }

        await openCamera(sel.value);
      } catch (err) {
        showToast("無法存取相機：" + err.message, "error");
      }
    }

    async function openCamera(deviceId) {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 1280 } }
      });
      currentStream = stream;
      const video = document.getElementById("camera-video");
      video.srcObject = stream;
      video.addEventListener("loadedmetadata", () => {
        video.play();
        requestAnimationFrame(scanLoop);
      }, { once: true });
    }

    async function switchCamera(deviceId) {
      try {
        await openCamera(deviceId);
      } catch (err) {
        showToast("切換鏡頭失敗：" + err.message, "error");
      }
    }

    const canvas = document.getElementById("qr-canvas");
    const ctx    = canvas.getContext("2d", { willReadFrequently: true });
    let lastCode = null;

    function scanLoop() {
      const video = document.getElementById("camera-video");
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: "dontInvert",
        });

        if (qr && qr.data && qr.data !== lastCode) {
          lastCode = qr.data;
          setTimeout(() => { lastCode = null; }, 1500); // 1.5s 同一碼靜默
          handleQRCode(qr.data);
        }
      }
      requestAnimationFrame(scanLoop);
    }

    function handleQRCode(raw) {
      let payload;
      try {
        payload = decodeJWT(raw);
      } catch {
        showToast("無效的 QR Code 格式", "error");
        addLog("（無法解析）", "—", "err");
        return;
      }

      const { id, name } = payload;
      if (!id || !name) {
        showToast("QR Code 缺少 id 或 name 欄位", "error");
        addLog(`id:${id} name:${name}`, "—", "err");
        return;
      }

      if (isDuplicate(id)) {
        showToast(`${name} 已重複掃描，請稍後再試`, "info");
        addLog(name, id, "dup");
        return;
      }

      scannedCodes.set(id, Date.now());

      const scannedType = currentType; // 掃描當下鎖定，後續切換不影響

      // 視覺回饋
      const wrapper = document.getElementById("camera-wrapper");
      wrapper.classList.remove("flash");
      void wrapper.offsetWidth; // reflow
      wrapper.classList.add("flash");
      wrapper.addEventListener("animationend", () => wrapper.classList.remove("flash"), { once: true });

      submitCheckin(id, name, scannedType)
        .then(() => {
          addLog(name, id, "ok", scannedType);
          showToast(`✅ ${name} ${scannedType}成功`, "success");
        })
        .catch(err => {
          addLog(name, id, "err", scannedType);
          showToast(`❌ ${name} 送出失敗：${err.message}`, "error");
        });
    }
  </script>
</body>
</html>
